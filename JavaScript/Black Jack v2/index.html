<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Black Jack</h1>
            <p>Get your sum as close to 21 as possible wihout going over it.</p>
        </header>
        <section id="deck">
            <h2 id="ghost-card">?</h2>
        </section>
        <section id="game-panel">
            <h3 id="sum-board">Sum: -</h3>
            <button id="btn-draw">Draw</button>
            <button id="btn-confirm">Confirm</button>
            <h3 id="player-stat"></h3>
        </section>
        <section id="popup">
            <h3>Game Over!</h3>
            <p></p>
            <button id="btn-reset">Reset</button>
        </section>
        <script src="index.js" defer></script>
    </body>
</html>
