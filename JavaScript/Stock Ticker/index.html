<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    </head>
    <body>
        <header>
            <h1>Cool Stock Viewer</h1>
        </header>
        <section>
            <img src="rhodes-logo.png">
            <ul id="list-main">
                <li class="list-item">
                    <div>
                        <h4 class="key">Name</h4>
                        <p class="value"></p>
                    </div>
                </li>
                <li class="list-item">
                    <div>
                        <h4 class="key">Symbol</h4>
                        <p class="value"></p>
                    </div>
                </li>
                <li class="list-item">
                    <div>
                        <h4 class="key">Price</h4>
                        <p class="value"></p>
                        <span class="material-symbols-outlined" id="price-arrow">arrow_outward</span>
                    </div>
                </li>
                <li class="list-item">
                    <div>
                        <h4 class="key">Time</h4>
                        <p class="value"></p>
                    </div>
                </li>
            </ul>
        </section>
        <script src="index.js" type="module"></script>
    </body>
</html>
